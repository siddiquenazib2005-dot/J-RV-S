services:
  - type: web
    name: j-rv-s
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --keep-alive 5
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
